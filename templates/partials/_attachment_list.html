{% if attachments %}
<div class="list-group list-group-flush">
    {% for att in attachments %}
    <div class="list-group-item d-flex justify-content-between align-items-center py-2 px-0">
        <div class="d-flex align-items-center">
            <i class="bi {{ att.icon }} me-2 text-muted fs-5"></i>
            <div>
                <a href="{{ url_for('attachments.download', id=att.id) }}" class="text-decoration-none fw-semibold">
                    {{ att.filename }}
                </a>
                <br>
                <small class="text-muted">{{ att.file_size_display }} &middot; {{ att.created_at.strftime('%d %b %Y') }}</small>
            </div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-danger"
                data-bs-toggle="modal" data-bs-target="#confirmDeleteModal"
                data-item-name="{{ att.filename }}"
                data-delete-url="{{ url_for('attachments.delete', id=att.id) }}"
                title="Delete">
            <i class="bi bi-trash"></i>
        </button>
    </div>
    {% endfor %}
</div>
{% else %}
<small class="text-muted">No attachments yet.</small>
{% endif %}
